- name: "behavior: non-breaking"
  description: "Changes that do not modify default behavior or break existing workflows."
  color: "20C997"
- name: "behavior: opt-in"
  description: "Features disabled by default and enabled only by explicit user action."
  color: "6610F2"

- name: "dev: ready"
  description: "Design approved and scope defined. Ready to start development."
  color: "F93F1F"
- name: "dev: blocked"
  description: "Blocked by a dependency, decision, or external constraint."
  color: "D1242F"
- name: "dev: in-progress"
  description: "Development is actively in progress."
  color: "D2F97F"
- name: "dev: ready-for-review"
  description: "Implementation completed and ready for review or QA."
  color: "553458"

- name: "needs: triage"
  description: "Needs initial review and categorization before being prioritized."
  color: "FBCA04"
- name: "needs: reproduction"
  description: "Needs clear steps to reproduce the issue before it can be fixed."
  color: "C2E0C6"
- name: "needs: design"
  description: "Requires design, UX, or CLI contract input before implementation."
  color: "5319E7"

- name: "priority: high"
  description: "Critical issue with immediate impact; must be resolved as soon as possible."
  color: "E11D21"
- name: "priority: normal"
  description: "Standard priority; should be addressed in the normal development cycle."
  color: "116045"
- name: "priority: low"
  description: "Minor issue with little impact; can be postponed if needed."
  color: "A6A09B"

- name: "scope: cli"
  description: "CLI arguments, command behavior, help output, and user-facing command flow."
  color: "0D6EFD"
- name: "scope: rendering"
  description: "Emoji rendering, resizing, margins, clipping, and PNG generation behavior."
  color: "FD7E14"
- name: "scope: unicode"
  description: "Unicode validation, emoji classification, ZWJ, modifiers, and emoji data."
  color: "0AA2C0"
- name: "scope: font-backend"
  description: "Font loading, font fallback, Segoe UI Emoji, and future backend support."
  color: "6F42C1"
- name: "scope: output-files"
  description: "Generated PNG names, output folders, artifacts, and file overwrite behavior."
  color: "198754"
- name: "scope: batch-processing"
  description: "Batch parsing, aliases, multi-emoji processing, and partial batch continuity."
  color: "28A745"
- name: "scope: logging"
  description: "Console messages, log files, severity levels, and diagnostic detail."
  color: "343A40"
- name: "scope: filesystem"
  description: "Filesystem paths, folder creation, permissions, and IO error handling."
  color: "5A6268"
- name: "scope: tests"
  description: "Unit tests, CLI tests, integration tests, fixtures, and regression coverage."
  color: "7057FF"
- name: "scope: ci"
  description: "GitHub Actions, CI checks, build jobs, and automated validation."
  color: "17A2B8"
- name: "scope: documentation"
  description: "README, usage guide, changelog, examples, and repository documentation."
  color: "006B75"
- name: "scope: packaging"
  description: "Project metadata, package installation, entry points, wheels, or binaries."
  color: "6610F2"
- name: "scope: dependencies"
  description: "Runtime and development dependency constraints or dependency updates."
  color: "0366D6"
- name: "scope: release"
  description: "Release preparation, versioning, changelog finalization, and tagging."
  color: "6C757D"
- name: "scope: repo-maintenance"
  description: "Repository maintenance such as labels, templates, gitignore, and branch hygiene."
  color: "ADB5BD"
- name: "scope: security"
  description: "Security-sensitive behavior, dependency risk, privacy, or safe failure handling."
  color: "B60205"

- name: "status: ready-for-review"
  description: "Ready for review; implementation completed and awaiting validation."
  color: "0D6EFD"
- name: "status: ready-for-merge"
  description: "Approved and validated, ready for final merge into the target branch."
  color: "0E8A16"
- name: "status: in-qa"
  description: "Implementation is under QA validation before final approval or merge."
  color: "C27AFF"
- name: "status: blocked-by-conflict"
  description: "Cannot be merged due to branch conflicts; requires synchronization."
  color: "E5533D"
- name: "status: backlog"
  description: "Approved but not yet scheduled for implementation."
  color: "6A737D"
- name: "status: good first issue"
  description: "Suitable for newcomers; small and well-defined scope."
  color: "7057FF"
- name: "status: duplicate"
  description: "Issue or PR already exists and will be closed as duplicate."
  color: "F28155"
- name: "status: invalid"
  description: "Not valid, not reproducible, wrong repo, or incomplete."
  color: "E4E669"
- name: "status: question"
  description: "Further information is requested; support or clarification is needed."
  color: "D876E3"
- name: "status: wontfix"
  description: "Will not be worked on or merged."
  color: "2CCE03"
- name: "status: help wanted"
  description: "Extra attention or community help is welcome."
  color: "008672"

- name: "type: release"
  description: "Tasks related to preparing, tagging, or publishing a release."
  color: "1D76DB"
- name: "type: chore"
  description: "Routine maintenance tasks with no feature impact."
  color: "CFD3D7"
- name: "type: bug"
  description: "A confirmed defect causing incorrect or unexpected behavior."
  color: "D73A4A"
- name: "type: feature"
  description: "A new functionality or significant enhancement."
  color: "0E8A16"
- name: "type: hotfix"
  description: "Urgent fix applied directly to production or a release branch."
  color: "B60205"
- name: "type: documentation"
  description: "Documentation-related changes or issues."
  color: "006B75"
- name: "type: performance"
  description: "Performance or stability issue related to CPU, memory, IO, or long runs."
  color: "C2E0C6"
- name: "type: investigation"
  description: "Pre-triage investigation to gather evidence before classification."
  color: "5319E7"
- name: "type: edge-case"
  description: "Non-blocking behavior under specific or uncommon conditions."
  color: "FBCA04"
